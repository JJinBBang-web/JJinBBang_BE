spring:
  config:
    import: classpath:security-path.yml

  profiles:
    active: prod

  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: ${spring.datasource.driver-class-name}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

  data:
    mongodb:
      uri: ${spring.data.mongodb.uri}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${spring.security.oauth2.client.registration.kakao.client-id}
            client-secret: ${spring.security.oauth2.client.registration.kakao.client-secret}
            client-authentication-method: ${spring.security.oauth2.client.registration.kakao.client-authentication-method}
            authorization-grant-type: ${spring.security.oauth2.client.registration.kakao.authorization-grant-type}
            redirect-uri: ${spring.security.oauth2.client.registration.kakao.redirect-uri}
            client-name: ${spring.security.oauth2.client.registration.kakao.client-name}
#            scope: ${spring.security.oauth2.client.registration.kakao.scope} # 필요 시 활성화
          google:
            client-id: ${spring.security.oauth2.client.registration.google.client-id}
            client-secret: ${spring.security.oauth2.client.registration.google.client-secret}
            client-authentication-method: ${spring.security.oauth2.client.registration.google.client-authentication-method}
            authorization-grant-type: ${spring.security.oauth2.client.registration.google.authorization-grant-type}
            redirect-uri: ${spring.security.oauth2.client.registration.google.redirect-uri}
            client-name: ${spring.security.oauth2.client.registration.google.client-name}
          naver:
            client-id: ${spring.security.oauth2.client.registration.naver.client-id}
            client-secret: ${spring.security.oauth2.client.registration.naver.client-secret}
            redirect-uri: ${spring.security.oauth2.client.registration.naver.redirect-uri}
            authorization-grant-type: ${spring.security.oauth2.client.registration.naver.authorization-grant-type}
            client-authentication-method: ${spring.security.oauth2.client.registration.naver.client-authentication-method}
            
        provider:
          kakao:
            authorization-uri: ${spring.security.oauth2.client.provider.kakao.authorization-uri}
            token-uri: ${spring.security.oauth2.client.provider.kakao.token-uri}
            user-info-uri: ${spring.security.oauth2.client.provider.kakao.user-info-uri}
            user-name-attribute: ${spring.security.oauth2.client.provider.kakao.user-name-attribute}
          google:
            authorization-uri: ${spring.security.oauth2.client.provider.google.authorization-uri}
            token-uri: ${spring.security.oauth2.client.provider.google.token-uri}
            user-info-uri: ${spring.security.oauth2.client.provider.google.user-info-uri}
            user-name-attribute: ${spring.security.oauth2.client.provider.google.user-name-attribute}
          naver:
            authorization-uri: ${spring.security.oauth2.client.provider.naver.authorization-uri}
            token-uri: ${spring.security.oauth2.client.provider.naver.token-uri}
            user-info-uri: ${spring.security.oauth2.client.provider.naver.user-info-uri}
            user-name-attribute: ${spring.security.oauth2.client.provider.naver.user-name-attribute}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${spring.mail.username}
    password: ${spring.mail.password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust:
              smtp.gmail.com
            protocols:
              TLSv1.2

  messages:
    encoding: UTF-8
    basename: ValidationMessages

cloud:
  aws:
    region:
      static: ${cloud.aws.region.static}
    s3:
      bucket: ${cloud.aws.s3.bucket}
    cdn:
      domain: ${cloud.aws.cdn.domain}

jwt:
  secret: ${jwt.secret}
  expiration-time:
    access-token: ${jwt.expiration-time.access-token}
    refresh-token: ${jwt.expiration-time.refresh-token}
    signup-token: ${jwt.expiration-time.signup-token}

mail-auth:
  expiration-time: ${mail-auth.expiration-time}
  auth-code-length: ${mail-auth.auth-code-length}
  allowed-domain:
    - gnu.ac.kr
    - gmail.com
  # docker-compose.yml에서 관리할 수 있도록 환경변수로 설정함
  subject-text: "[찐빵] 이메일 인증코드"
  body-text: "찐빵 이메일 인증 코드입니다.\n\n아래 인증 코드를 입력하여 이메일 인증을 완료해주세요.\n\n인증 코드: %s\n\n이 코드는 %s분간 유효합니다."

logging:
  level:
    org.hibernate.sql: debug
    org.hibernate.typ e: trace
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info"   # health, info만 외부 노출
  endpoint:
    health:
      show-details: when_authorized # 인증된 경우에만 상세 표시
  health:
    # 필수 의존성만 활성화할 것..!
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: false   # 디스크 용량 체크 일단 꺼둠


# JWT 토큰, 이메일 인증코드 저장 방식 설정 (inmemory, redis 등)
app:
  repository:
    mode:
#      inmemory
      redis

user:
  deletion:
    grace-days: 30 # 사용자가 탈퇴한 후, 해당 사용자의 데이터가 삭제되기까지의 기간 (일 단위)
