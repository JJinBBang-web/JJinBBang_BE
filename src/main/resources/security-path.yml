security:
  path:
    # 모든 요청에 대해 인증을 요구하지 않는 경로 설정
    permit-all:
      ALL:
        - "/swagger-ui/**"
        - "/v3/api-docs/**"
        - "/api/v1/user/univ/campus"
      #        - "/api/v1/user/**"
      #        - "/api/v1/map/**"
      GET:
        - "/api/v1/test"
      POST:
        - "/api/v1/test"
      PUT:
        - "/api/v1/test"
      PATCH:
        - "/api/v1/test"
      DELETE:
        - "/api/v1/test"

    # 인증된 사용자만 접근 가능한 경로 설정
    authenticated:
      ALL:
        - "/api/v1/user/bookmark"
        - "/api/v1/user/recentReview"
        - "/api/v1/auth/tokenRefresh"
        - "/api/v1/auth/logout"
      #        - "/api/v1/user"
      #        - "/api/v1/certificates/**"
      #        - "/api/v1/user/**"
      #        - "/api/v1/building/**"
      #        - "/api/v1/review/**"
      #        - "/api/v1/notification/**"
      GET:
        - "/api/v1/test"
      POST:
        - "/api/v1/test"
      PUT:
        - "/api/v1/test"
      PATCH:
        - "/api/v1/test"
      DELETE:
        - "/api/v1/test"

    # 인증되지 않은 사용자만 접근 가능한 경로 설정
    anonymous:
      ALL:
        - "/api/v1/auth"
      GET:
        - "/api/v1/test"
      POST:
        - "/api/v1/test"
      PUT:
        - "/api/v1/test"
      PATCH:
        - "/api/v1/test"
      DELETE:
        - "/api/v1/test"

    # 유저의 학교 인증 상태에 따라 접근 가능한 경로 설정
    verification-status-based:
      # 어떠한 방식으로든 대학교 인증을 받은 사용자만 접근 가능한 경로
      VERIFIED:
        ALL:
          - "/api/v1/verifiedTest"
        GET:
          - "/api/v1/verifiedTest"
        POST:
          - "/api/v1/verifiedTest"
        PUT:
          - "/api/v1/verifiedTest"
        PATCH:
          - "/api/v1/verifiedTest"
        DELETE:
          - "/api/v1/verifiedTest"

      # 이메일 인증을 수행한 사용자만 접근 가능한 경로
      EMAIL_VERIFIED:
        ALL:
          - "/api/v1/emailVerifiedTest"
        GET:
          - "/api/v1/emailVerifiedTest"
        POST:
          - "/api/v1/emailVerifiedTest"
        PUT:
          - "/api/v1/emailVerifiedTest"
        PATCH:
          - "/api/v1/emailVerifiedTest"
        DELETE:
          - "/api/v1/emailVerifiedTest"

      # 재학생 인증을 수행한 사용자만 접근 가능한 경로
      ENROLL_STUDENT_VERIFIED:
        ALL:
          - "/api/v1/enrollStudentVerifiedTest"
        GET:
          - "/api/v1/enrollStudentVerifiedTest"
        POST:
          - "/api/v1/enrollStudentVerifiedTest"
        PUT:
          - "/api/v1/enrollStudentVerifiedTest"
        PATCH:
          - "/api/v1/enrollStudentVerifiedTest"
        DELETE:
          - "/api/v1/enrollStudentVerifiedTest"

      # 신입생 인증을 수행한 사용자만 접근 가능한 경로
      NEW_STUDENT_VERIFIED:
        ALL:
          - "/api/v1/newStudentVerifiedTest"
        GET:
          - "/api/v1/newStudentVerifiedTest"
        POST:
          - "/api/v1/newStudentVerifiedTest"
        PUT:
          - "/api/v1/newStudentVerifiedTest"
        PATCH:
          - "/api/v1/newStudentVerifiedTest"
        DELETE:
          - "/api/v1/newStudentVerifiedTest"

      # 대학교 인증을 수행하지 않은 사용자만 접근 가능한 경로
      UNVERIFIED:
        ALL:
          - "/api/v1/unverifiedTest"
          - "/api/v1/auth/emailCode"
          - "/api/v1/auth/emailCode/verify"
          - "/api/v1/certificates/admission/verify"
          - "/api/v1/certificates/enrollment/verify"
        GET:
          - "/api/v1/unverifiedTest"
        POST:
          - "/api/v1/unverifiedTest"
        PUT:
          - "/api/v1/unverifiedTest"
        PATCH:
          - "/api/v1/unverifiedTest"
        DELETE:
          - "/api/v1/unverifiedTest"

      # 대학교 인증 검토중인 사용자만 접근 가능한 경로
      PENDING:
        ALL:
          - "/api/v1/pendingTest"
        GET:
          - "/api/v1/pendingTest"
        POST:
          - "/api/v1/pendingTest"
        PUT:
          - "/api/v1/pendingTest"
        PATCH:
          - "/api/v1/pendingTest"
        DELETE:
          - "/api/v1/pendingTest"

    # 약관 동의를 하지 않아 DB에 유저 엔티티 생성 대기중인 경우에만 접근 가능한 경로 (JWT 토큰 필요)
    pending-user:
      ALL:
        - "/api/v1/auth/signup"
      GET:
        - "/api/v1/test"
      POST:
        - "/api/v1/test"
      PUT:
        - "/api/v1/test"
      PATCH:
        - "/api/v1/test"
      DELETE:
        - "/api/v1/test"

    # 리프레시 토큰을 이용한 토큰 갱신 요청에 대한 경로 설정
    refresh:
      ALL:
        - "/api/v1/auth/tokenRefresh"
      GET:
        - "/api/v1/test"
      POST:
        - "/api/v1/test"
      PUT:
        - "/api/v1/test"
      PATCH:
        - "/api/v1/test"
      DELETE:
        - "/api/v1/test"

    # 위에서 설정하지 않은 모든 요청에 대한 접근 제어 설정
    any-request: "permit-all"  # 'authenticated', 'permit-all', 'anonymous' 중 하나
