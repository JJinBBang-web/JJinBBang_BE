name: Build and Deploy to EC2 (test)

on:
  push:
    branches:
      - test

env:
  AWS_REGION: ap-northeast-2
  AWS_S3_BUCKET: jjinbbang-bucket
  AWS_CODE_DEPLOY_APPLICATION: jjinbbang-application-CD-test
  AWS_CODE_DEPLOY_GROUP: jjinbbang-deployment-group-test

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # JDK 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 숨길 설정 파일 생성 (base64 미사용 버전)
      - name: make .env & config files for compose
        run: |
          mkdir -p ./config
          # docker-compose가 마운트하는 외부 설정
          printf '%s' "${{ secrets.TEST_APPLICATION_PROD }}" > ./config/application-prod.yml
          printf '%s' "${{ secrets.TEST_SECURITY_PATH }}" > ./config/security-path.yml
          printf '%s' "${{ secrets.TEST_GCP_IAM_KEY }}" > ./config/gcp_iam_key.json

          # 환경변수 (compose의 env_file 로 사용)
          printf '%s' "${{ secrets.TEST_ENV }}" > ./.env
          echo "" >> ./.env
          echo "CLOUD_AWS_S3_PREFIX=test" >> ./.env

      # 배포 번들(zip) 생성
      - name: Make zip file
        run: |
          zip -r ./$GITHUB_SHA-test.zip . \
            -x "*.git*" ".github/*" # 불필요 파일 제외는 취향껏
        shell: bash

      # AWS 자격증명
      - name: AWS credential 설정
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_IAM_ACCESS_KEY_TEST }}
          aws-secret-access-key: ${{ secrets.AWS_IAM_PRIVATE_KEY_TEST }}

      # S3에 배포 번들 업로드 (test/ prefix로 구분)
      - name: Upload to S3
        run: aws s3 cp --region ${{ env.AWS_REGION }} ./$GITHUB_SHA-test.zip s3://$AWS_S3_BUCKET/test/$GITHUB_SHA.zip

      # CodeDeploy 배포 생성
      - name: EC2에 배포 (CodeDeploy)
        run: |
          aws deploy create-deployment \
            --application-name ${{ env.AWS_CODE_DEPLOY_APPLICATION }} \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --deployment-group-name ${{ env.AWS_CODE_DEPLOY_GROUP }} \
            --s3-location bucket=${{ env.AWS_S3_BUCKET }},key=test/$GITHUB_SHA.zip,bundleType=zip
