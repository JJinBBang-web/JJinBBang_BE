server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: jjinbbang-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: jjinbbang-app
          __path__: /logs/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            traceId: traceId
            spanId: spanId
            service: service
            thread: threadName
            logger: loggerName
      - labels:
          level:
          service:
          traceId:
          spanId:
